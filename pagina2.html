<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quebra-cabeça do coração</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom, #1e3c72, #2a5298);
      color: #fff;
      font-family: 'Arial', sans-serif;
      text-align: center;
    }
    .puzzle {
      display: grid;
      grid-template-columns: repeat(2, 100px);
      grid-template-rows: repeat(2, 100px);
      gap: 2px;
      margin-bottom: 20px;
    }
    .piece {
      width: 100px;
      height: 100px;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.3s;
    }
    .piece.active {
      opacity: 1;
    }
    .key-button {
      display: none;
      margin-top: 20px;
      background: #ffc107;
      color: #000;
      border: none;
      padding: 12px 20px;
      border-radius: 50%;
      font-size: 1.2em;
      cursor: pointer;
    }
    .frase {
      margin-top: 15px;
      font-size: 1.2em;
      display: none;
    }
  </style>
</head>
<body>
  <h2>Monte o coração </h2>
  <div class="puzzle">
    <img src="peca1.png" class="piece" onclick="ativar(this)">
    <img src="peca2.png" class="piece" onclick="ativar(this)">
    <img src="peca3.png" class="piece" onclick="ativar(this)">
    <img src="peca4.png" class="piece" onclick="ativar(this)">
  </div>

  <button class="key-button" id="keyBtn" onclick="irParaPagina3()">🔑</button>
  <div class="frase" id="frase">Você encaixou todas as peças... a chave do meu coração é sua!</div>

  <script>
    let ativadas = 0;
    function ativar(el) {
      if (!el.classList.contains("active")) {
        el.classList.add("active");
        ativadas++;
      }
      if (ativadas === 4) {
        document.getElementById("keyBtn").style.display = "inline-block";
        document.getElementById("frase").style.display = "block";
      }
    }
    function irParaPagina3() {
      window.location.href = "pagina3.html";
    }
  </script>
</body>
</html>
